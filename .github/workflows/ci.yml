name: ci

# PoMFRIT native deps (MAYO + VOLE-in-the-head) build on Linux x86_64 only.
# FAEST is pure Rust. Full workspace CI runs on ubuntu-latest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ubuntu (PoMFRIT + FAEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PoMFRIT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 build-essential pipx git
          pipx install meson ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build PoMFRIT native dependencies
        run: bash scripts/build-pomfrit-deps.sh

      - name: cargo fmt check
        run: cargo fmt --all --check

      - name: build
        run: cargo build --workspace --all-targets

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: test (dev-sim protocol e2e)
        run: cargo test -p eat-pass-core -p eat-pass-cli --features dev-sim

  redis:
    name: redis backend
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PoMFRIT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 build-essential pipx git
          pipx install meson ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build PoMFRIT native dependencies
        run: bash scripts/build-pomfrit-deps.sh

      - name: clippy (redis feature)
        run: cargo clippy -p eat-pass-cli --features redis --all-targets -- -D warnings

      - name: test (redis feature)
        run: cargo test -p eat-pass-cli --features redis

  mobile-bindings:
    name: mobile bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PoMFRIT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 build-essential pipx git
          pipx install meson ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build PoMFRIT native dependencies
        run: bash scripts/build-pomfrit-deps.sh

      - name: generate kotlin + swift bindings
        run: ./mobile/generate-bindings.sh

      - name: upload bindings
        uses: actions/upload-artifact@v4
        with:
          name: eat-pass-mobile-bindings
          path: mobile/bindings/
