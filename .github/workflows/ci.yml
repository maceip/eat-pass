name: ci

# Build + test the workspace on linux/macos/windows. The credential is pure
# Rust (blind-rsa + ed25519 + getrandom), so it must be green everywhere.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt check
        run: cargo fmt --all --check
        if: matrix.os == 'ubuntu-latest'
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace
