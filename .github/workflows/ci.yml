name: ci

# Build + test the workspace on linux/macos/windows. The credential is pure
# Rust (blind-rsa + ed25519 + getrandom), so it must be green everywhere.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt check
        run: cargo fmt --all --check
        if: matrix.os == 'ubuntu-latest'
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace

  # Exercises the optional networked shared-state backend (m3) against a real
  # Redis. Kept off the default matrix so the credential build stays pure-Rust
  # and cross-platform.
  redis:
    name: redis backend
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - name: clippy (redis feature)
        run: cargo clippy -p eat-pass-cli --features redis --all-targets -- -D warnings
      - name: test (redis feature)
        run: cargo test -p eat-pass-cli --features redis
