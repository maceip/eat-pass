name: ci

# Build + test the workspace on linux/macos/windows. The credential is pure
# Rust (blind-rsa + ed25519 + getrandom), so it must be green everywhere.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt check
        run: cargo fmt --all --check
        if: matrix.os == 'ubuntu-latest'
      - name: build
        run: cargo build --workspace --all-targets
      - name: clippy (shipped surface, no insecure paths)
        run: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.os == 'ubuntu-latest'
      - name: test (shipped surface)
        run: cargo test --workspace
      # Protocol end-to-end coverage runs the dev-sim attestation stand-ins,
      # which are compiled ONLY here — never in the shipped binary.
      - name: test (dev-sim protocol e2e)
        run: cargo test -p eat-pass-core -p eat-pass-cli --features dev-sim

  # Exercises the optional networked shared-state backend (m3) against a real
  # Redis. Kept off the default matrix so the credential build stays pure-Rust
  # and cross-platform.
  redis:
    name: redis backend
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - name: clippy (redis feature)
        run: cargo clippy -p eat-pass-cli --features redis --all-targets -- -D warnings
      - name: test (redis feature)
        run: cargo test -p eat-pass-cli --features redis

  # Generate the Android (Kotlin) + iOS (Swift) UniFFI bindings from the built
  # cdylib and publish them as artifacts. The crate itself is built/tested by the
  # default matrix above; this proves the binding pipeline is reproducible.
  mobile-bindings:
    name: mobile bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate kotlin + swift bindings
        run: ./mobile/generate-bindings.sh
      - name: upload bindings
        uses: actions/upload-artifact@v4
        with:
          name: eat-pass-mobile-bindings
          path: mobile/bindings/
