name: release

# PoMFRIT spend tokens require Linux x86_64 native builds. Release ships the
# eat-pass binary for that target (Azure CVM / Linux agent deployment).

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "cli/**"
      - "gate/**"
      - "policy/**"
      - "pomfrit/**"
      - "mobile/**"
      - "scripts/**"
      - "third_party/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PoMFRIT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 build-essential pipx git
          pipx install meson ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build PoMFRIT native dependencies
        run: bash scripts/build-pomfrit-deps.sh

      - name: Install Rust target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Build eat-pass
        run: cargo build --release -p eat-pass-cli --bin eat-pass --target x86_64-unknown-linux-gnu

      - name: Stage
        run: |
          set -euo pipefail
          mkdir -p dist
          out="eat-pass-x86_64-unknown-linux-gnu"
          cp "target/x86_64-unknown-linux-gnu/release/eat-pass" "dist/$out"
          ( cd dist && shasum -a 256 "$out" > "$out.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: eat-pass-x86_64-unknown-linux-gnu
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Build provenance for the binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/eat-pass-*"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: eat-pass v0.1.${{ github.run_number }}
          generate_release_notes: true
          files: dist/*
